<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>ChatBot</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f7f7f8;
      margin: 0;
    }
    .chat-container {
      max-width: 700px;
      margin: auto;
      padding: 20px;
      background: white;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .messages {
      flex: 1;
      overflow-y: auto;
      padding-bottom: 20px;
    }
    .message {
      margin: 10px 0;
      padding: 12px 16px;
      border-radius: 10px;
      max-width: 80%;
      word-wrap: break-word;
    }
    .user-message {
      background: #dcf8c6;
      align-self: flex-end;
    }
    .bot-message {
      background: #ececec;
      align-self: flex-start;
      white-space: pre-wrap;
    }
    .input-area {
      display: flex;
      padding: 10px 0;
      border-top: 1px solid #ccc;
    }
    input[type="text"] {
      flex: 1;
      padding: 12px;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 6px;
    }
    button {
      margin-left: 10px;
      padding: 12px 16px;
      font-size: 16px;
      background: #10a37f;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    .typing-dots {
      display: inline-flex;
      gap: 4px;
      margin-left: 6px;
      vertical-align: middle;
    }
    .typing-dots span {
      width: 8px;
      height: 8px;
      background: #999;
      border-radius: 50%;
      animation: bounce 1.4s infinite ease-in-out both;
    }
    .typing-dots span:nth-child(1) {
      animation-delay: -0.32s;
    }
    .typing-dots span:nth-child(2) {
      animation-delay: -0.16s;
    }
    .typing-dots span:nth-child(3) {
      animation-delay: 0s;
    }
    @keyframes bounce {
      0%,
      80%,
      100% {
        transform: scale(0);
      }
      40% {
        transform: scale(1);
      }
    }
  </style>
</head>
<body>
  <div class="chat-container">
    <div class="messages" id="chat-box"></div>
    <div class="input-area">
      <input type="text" id="user-input" placeholder="Type your message..." autocomplete="off" />
      <button id="send-btn">Send</button>
    </div>
  </div>
  <script>
    const chatBox = document.getElementById('chat-box');
    const inputEl = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');
    function appendMessage(content, className) {
      const msg = document.createElement('div');
      msg.className = `message ${className}`;
      msg.textContent = content;
      chatBox.appendChild(msg);
      chatBox.scrollTop = chatBox.scrollHeight;
      return msg;
    }
    function createTypingBubble() {
      const bubble = document.createElement('div');
      bubble.className = 'message bot-message';
      bubble.innerHTML = `<span>ChatBot is typing</span>
        <div class="typing-dots"><span></span><span></span><span></span></div>`;
      chatBox.appendChild(bubble);
      chatBox.scrollTop = chatBox.scrollHeight;
      return bubble;
    }
    function sendMessage() {
      const message = inputEl.value.trim();
      if (!message) return;
      // User bubble
      appendMessage(message, 'user-message');
      inputEl.value = '';
      // Bot bubble (empty, will fill as chunks arrive)
      const botBubble = appendMessage('', 'bot-message');
      // Temporary typing row
      const typing = createTypingBubble();
      const url = `/generate_stream?message=${encodeURIComponent(message)}`;
      const es = new EventSource(url);
      es.onmessage = (event) => {
        // Remove typing once first chunk arrives
        if (typing.parentNode) typing.remove();
        // Append streamed text
        botBubble.textContent += event.data;
        chatBox.scrollTop = chatBox.scrollHeight;
      };
      es.addEventListener('done', () => {
        es.close();
      });
      es.addEventListener('error', (e) => {
        if (typing.parentNode) typing.remove();
        botBubble.textContent = botBubble.textContent || 'Error getting response.';
        es.close();
      });
    }
    sendBtn.addEventListener('click', sendMessage);
    inputEl.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });
  </script>
</body>
</html>
